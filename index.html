<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISON ESCAPE: NO EXIT - EXTENDED</title>
    <style>
        :root {
            --bg-dark: #121212;
            --wall-stone: #3a3a3c;
            --iron-bar: #555;
            --led-red: #ff3b30;
            --led-green: #4cd964;
            --led-blue: #007aff;
            --terminal-green: #33ff33;
        }

        body {
            margin: 0; padding: 0; background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #eee; overflow: hidden; user-select: none;
        }

        #game-view {
            width: 100vw; height: 100vh;
            max-width: 500px; margin: 0 auto;
            display: flex; flex-direction: column;
            position: relative; border-left: 2px solid #333; border-right: 2px solid #333;
        }

        #scene {
            flex: 1; position: relative;
            background: var(--bg-dark);
            overflow: hidden;
            transition: background 0.5s;
        }

        #room-title {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 2px 8px;
            border-radius: 4px; font-size: 12px; z-index: 50;
        }

        #inventory {
            height: 80px; background: #1a1a1a;
            display: flex; gap: 8px; padding: 8px;
            border-top: 2px solid #444; overflow-x: auto;
        }
        .slot {
            min-width: 60px; height: 60px; background: #2c2c2e;
            border: 2px solid #555; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; text-align: center; cursor: pointer; color: #aaa;
        }
        .slot.selected { border-color: var(--led-blue); box-shadow: 0 0 8px var(--led-blue); color: #fff; }

        #msg {
            position: absolute; bottom: 90px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 8px;
            font-size: 13px; line-height: 1.4; border-left: 3px solid var(--led-blue);
            pointer-events: none; opacity: 0; transition: 0.3s; z-index: 100;
        }

        .nav-btn {
            position: absolute; width: 44px; height: 44px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white; cursor: pointer; z-index: 60;
            backdrop-filter: blur(2px); transition: 0.2s;
        }
        .nav-btn:active { background: rgba(255,255,255,0.4); transform: scale(1.1); }
        .nav-n { top: 10px; left: calc(50% - 22px); }
        .nav-s { bottom: 10px; left: calc(50% - 22px); }
        .nav-e { top: calc(50% - 22px); right: 10px; }
        .nav-w { top: calc(50% - 22px); left: 10px; }

        .obj { position: absolute; cursor: pointer; transition: 0.2s; }
        .obj:active { transform: scale(0.97); }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .close-overlay { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }

        .keypad { display: grid; grid-template-columns: repeat(3, 55px); gap: 10px; }
        .key { width: 55px; height: 55px; background: #333; border: 1px solid #666; 
               display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 6px;}
        .display { width: 185px; height: 45px; background: #000; color: var(--led-green); 
                   text-align: center; line-height: 45px; font-size: 22px; margin-bottom: 20px; border: 2px solid #444; }

        #terminal-screen {
            width: 90%; height: 80%; background: #000; border: 4px solid #555;
            color: var(--terminal-green); padding: 10px; font-family: monospace; font-size: 12px;
            display: flex; flex-direction: column;
        }
        #term-output { flex: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; }
        #term-input-line { display: flex; gap: 5px; }
        #term-input { background: transparent; border: none; color: var(--terminal-green); outline: none; font-family: monospace; flex: 1; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #end-screen {
            position: absolute; inset: 0; background: #000; z-index: 300;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 30px;
        }
    </style>
</head>
<body>

<div id="game-view">
    <div id="scene">
        <div id="room-title">Cell #101</div>
    </div>

    <div id="nav-n" class="nav-btn nav-n" onclick="moveRoom('n')" style="display:none;">▲</div>
    <div id="nav-s" class="nav-btn nav-s" onclick="moveRoom('s')" style="display:none;">▼</div>
    <div id="nav-e" class="nav-btn nav-e" onclick="moveRoom('e')" style="display:none;">▶</div>
    <div id="nav-w" class="nav-btn nav-w" onclick="moveRoom('w')" style="display:none;">◀</div>

    <div id="msg"></div>

    <div id="inventory">
        <div class="slot" id="slot-0" onclick="selectItem(0)"></div>
        <div class="slot" id="slot-1" onclick="selectItem(1)"></div>
        <div class="slot" id="slot-2" onclick="selectItem(2)"></div>
        <div class="slot" id="slot-3" onclick="selectItem(3)"></div>
        <div class="slot" id="slot-4" onclick="selectItem(4)"></div>
    </div>

    <div id="overlay">
        <div class="close-overlay" onclick="closeOverlay()">×</div>
        <div id="overlay-content"></div>
    </div>

    <div id="end-screen">
        <h1 id="end-title" style="font-size:24px; margin-bottom:20px;"></h1>
        <p id="end-msg" style="font-size:14px; line-height:1.6; color:#ccc; margin-bottom:30px;"></p>
        <button onclick="location.reload()" style="padding:10px 20px; background:#333; color:white; border:1px solid #666; cursor:pointer;">RETRY</button>
    </div>
</div>

<script>
    // --- ゲーム状態 ---
    const state = {
        currentRoom: 'cell',
        inventory: [],
        selectedItem: null,
        wallScraped: false,
        hasSpoon: false,
        cellDoorOpen: false,
        hasStaffCard: false,
        wardPowerOn: false,
        securityDoorOpen: false,
        hasRustyKey: false,
        mainGateOpen: false,
        ductExplored: 0,
        alarmTriggered: false,
        gameEnded: false
    };

    const items = {
        spoon: { id: 'spoon', name: 'スプーン' },
        note: { id: 'note', name: '紙片[8241]' },
        card: { id: 'card', name: '職員ID証' },
        key: { id: 'key', name: '錆びた鍵' }
    };

    const codes = {
        cellDoor: "8241",
        pcPass: "evil" 
    };

    // --- ルーム定義 ---
    const rooms = {
        cell: {
            title: "独房 #101",
            bg: "linear-gradient(to bottom, #2a2a2c, #0a0a0a)",
            nav: {},
            setup: (container) => {
                // 壁面
                addDivObj(container, 'wall-back', 0, 0, 500, 200, 'background:#333; border-bottom:4px solid #111;');
                // ベッド（より大きく、押しやすく）
                addSvgObj(container, 'bed', 20, 280, 250, 120, '<rect x="0" y="20" width="240" height="80" fill="#222" rx="5"/><rect x="10" y="10" width="60" height="30" fill="#444" rx="3"/><path d="M0,60 H240" stroke="#111" stroke-width="2"/>', tapBed);
                // 壁のひび割れ
                addSvgObj(container, 'crack', 120, 80, 100, 100, '<path d="M20,20 L40,50 L30,80 M40,50 L70,40 L80,70" stroke="#000" fill="none" stroke-width="3" opacity="0.6"/>', tapWall);
                // ドア
                addSvgObj(container, 'door-bg', 320, 40, 140, 400, '<rect x="0" y="0" width="140" height="400" fill="#1a1a1a" stroke="#333" stroke-width="8"/>', tapCellDoor);
                for(let i=0; i<5; i++) {
                    addDivObj(container, `bar-${i}`, 335 + (i*25), 40, 6, 400, 'background:linear-gradient(to right, #444, #666, #333); pointer-events:none;');
                }
                // キーパネル
                const panelColor = state.cellDoorOpen ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(container, 'panel', 285, 180, 40, 60, `background:#222; border:2px solid #555; border-radius:4px; box-shadow:0 0 10px #000;`, openKeypad);
                addDivObj(container, 'panel-led', 300, 190, 10, 10, `background:${panelColor}; border-radius:50%; pointer-events:none; box-shadow:0 0 5px ${panelColor};`);
            }
        },
        ward: {
            title: "隔離病棟廊下 (HUB)",
            bg: "#151515",
            nav: { n: 'duty', s: 'storage', e: 'maingate', w: 'infirmary' },
            setup: (container) => {
                addSvgObj(container, 'hall', 0, 0, 500, 500, '<path d="M100,100 L400,100 L500,0 L0,0 Z" fill="#222"/><path d="M100,400 L400,400 L500,500 L0,500 Z" fill="#222"/>', null, true);
                addDivObj(container, 'celldoor', 0, 150, 60, 200, 'background:#333; border-right:4px solid #555;', () => changeRoom('cell'));
                addDivObj(container, 'graffiti', 120, 220, 100, 40, 'color:#2a2a2a; font-size:24px; transform:rotate(-5deg); font-weight:bold; font-family:serif;', null, "L I V E");
                
                // セキュリティルームへの扉
                const secColor = state.securityDoorOpen ? '#4cd964' : '#555';
                addDivObj(container, 'sec-door-label', 380, 120, 80, 20, 'font-size:10px; color:#666;', null, "SECURITY");
                addDivObj(container, 'sec-door', 420, 150, 80, 200, `background:#222; border-left:4px solid ${secColor};`, tapSecurityDoor);
            }
        },
        duty: {
            title: "看守詰所",
            bg: "#2c2c2e",
            nav: { s: 'ward' },
            setup: (container) => {
                addSvgObj(container, 'desk', 100, 220, 300, 100, '<rect x="0" y="0" width="300" height="20" fill="#1a1a1b"/><rect x="20" y="20" width="20" height="80" fill="#1a1a1b"/><rect x="260" y="20" width="20" height="80" fill="#1a1a1b"/>', null, true);
                addSvgObj(container, 'pc', 170, 140, 120, 85, '<rect x="0" y="0" width="120" height="80" fill="#555" rx="5"/><rect x="8" y="8" width="104" height="64" fill="#000"/><rect x="20" y="80" width="80" height="5" fill="#444"/>', openPc);
                const breakerColor = state.wardPowerOn ? 'var(--led-green)' : 'var(--led-red)';
                addSvgObj(container, 'breaker', 380, 80, 70, 100, `<rect x="0" y="0" width="70" height="100" fill="#333" stroke="#555"/><circle cx="35" cy="40" r="12" fill="${breakerColor}"/>`, tapBreaker);
                addSvgObj(container, 'locker', 30, 100, 70, 280, '<rect x="0" y="0" width="70" height="280" fill="#3a3a3c" stroke="#555"/><rect x="10" y="120" width="8" height="40" fill="#111" rx="2"/>', tapLocker);
            }
        },
        securityRoom: {
            title: "セキュリティ管理室",
            bg: "#1a1a1c",
            nav: { w: 'ward' },
            setup: (container) => {
                addDivObj(container, 'monitor-wall', 50, 50, 400, 150, 'background:#111; border:2px solid #444; display:grid; grid-template-columns:repeat(3,1fr); gap:5px; padding:5px;', null, 
                    `<div style="background:#050505; border:1px solid #222;"></div><div style="background:#050505; border:1px solid #222;"></div><div style="background:#050505; border:1px solid #222;"></div>`);
                
                // 職員IDが置いてあるデスク
                addDivObj(container, 'sec-desk', 100, 300, 300, 20, 'background:#444;');
                if(!state.hasStaffCard) {
                    addDivObj(container, 'staff-id-card', 220, 285, 40, 25, 'background:#fff; color:#000; font-size:8px; border-radius:2px; box-shadow:0 0 5px rgba(255,255,255,0.5);', tapStaffCard, "ID:1004");
                }
                addDivObj(container, 'memo-sec', 120, 285, 30, 20, 'background:#ffffaa; transform:rotate(5deg);');
            }
        },
        infirmary: {
            title: "医務室",
            bg: "#252825",
            nav: { e: 'ward' },
            setup: (container) => {
                addDivObj(container, 'medical-bed', 50, 250, 180, 120, 'background:#eee; border-top:10px solid #ccc; border-radius:5px 5px 0 0;');
                addSvgObj(container, 'shelf', 300, 100, 150, 250, '<rect x="0" y="0" width="150" height="250" fill="#444" stroke="#666"/><rect x="10" y="50" width="130" height="5" fill="#222"/><rect x="10" y="120" width="130" height="5" fill="#222"/><rect x="10" y="190" width="130" height="5" fill="#222"/>', null, true);
                addDivObj(container, 'bottle', 320, 150, 20, 40, 'background:rgba(0,120,255,0.4); border:1px solid #fff; border-radius:2px;', () => showMsg("強力な鎮静剤のようだ。"));
            }
        },
        storage: {
            title: "地下倉庫",
            bg: "#101010",
            nav: { n: 'ward' },
            setup: (container) => {
                addSvgObj(container, 'machine', 80, 180, 180, 180, '<rect x="0" y="0" width="180" height="180" fill="#333" rx="10"/><circle cx="90" cy="90" r="50" fill="#111" stroke="#444" stroke-width="5"/><path d="M90,40 V140 M40,90 H140" stroke="#222" stroke-width="2"/>', tapMachine);
                addSvgObj(container, 'duct', 380, 60, 80, 80, '<rect x="0" y="0" width="80" height="80" fill="#000" stroke="#444"/><path d="M0,0 L80,80 M80,0 L0,80" stroke="#444"/>', tapDuct);
            }
        },
        maingate: {
            title: "施設正門",
            bg: "#000",
            nav: { w: 'ward' },
            setup: (container) => {
                addSvgObj(container, 'gate', 50, 50, 400, 400, '<rect x="0" y="0" width="400" height="400" fill="#111" stroke="#333" stroke-width="5"/><path d="M0,100 H400 M0,200 H400 M0,300 H400 M100,0 V400 M200,0 V400 M300,0 V400" stroke="#222" stroke-width="2"/>', tapMainGate);
                const keyholeColor = state.mainGateOpen ? 'var(--led-green)' : 'var(--led-blue)';
                addDivObj(container, 'keyhole', 420, 220, 30, 50, `background:#222; border:2px solid ${keyholeColor}; border-radius:4px;`, tapKeyhole);
            }
        }
    };

    // --- コア・ロジック ---
    function initGame() {
        changeRoom(state.currentRoom);
        updateInventoryUI();
        showMsg("...意識が戻った。ここから出なければ。");
    }

    function changeRoom(roomId) {
        state.currentRoom = roomId;
        const room = rooms[roomId];
        const scene = document.getElementById('scene');
        const title = document.getElementById('room-title');
        scene.innerHTML = '';
        scene.appendChild(title);
        closeOverlay();
        title.innerText = room.title;
        scene.style.background = room.bg;
        room.setup(scene);
        updateNavButtons(room.nav);
    }

    function updateNavButtons(nav) {
        ['n', 's', 'e', 'w'].forEach(dir => {
            const btn = document.getElementById(`nav-${dir}`);
            btn.style.display = nav[dir] ? 'flex' : 'none';
            if (nav[dir]) btn.onclick = () => changeRoom(nav[dir]);
        });
    }

    function addSvgObj(container, id, x, y, w, h, svgContent, action, isBackground = false) {
        const el = document.createElement('div');
        el.id = `obj-${id}`;
        el.className = isBackground ? '' : 'obj';
        el.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:${isBackground ? 1 : 10};`;
        if (action) el.onclick = action;
        el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none">${svgContent}</svg>`;
        container.appendChild(el);
    }

    function addDivObj(container, id, x, y, w, h, css, action, text = '') {
        const el = document.createElement('div');
        el.id = `obj-${id}`;
        el.className = action ? 'obj' : '';
        el.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:11; ${css}`;
        if (action) el.onclick = action;
        el.innerHTML = text;
        container.appendChild(el);
    }

    function showMsg(text) {
        const m = document.getElementById('msg');
        m.innerText = text; m.style.opacity = 1;
        clearTimeout(state.msgTimer);
        state.msgTimer = setTimeout(() => { m.style.opacity = 0; }, 3000);
    }

    function updateInventoryUI() {
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerText = state.inventory[i] ? state.inventory[i].name : "";
            slot.classList.remove('selected');
            if(state.selectedItem === i) slot.classList.add('selected');
        }
    }

    function selectItem(index) {
        if(state.inventory[index]) {
            state.selectedItem = (state.selectedItem === index) ? null : index;
        } else state.selectedItem = null;
        updateInventoryUI();
    }

    function getSelectedItem() { return state.inventory[state.selectedItem]; }
    function openOverlay(htmlContent) {
        document.getElementById('overlay-content').innerHTML = htmlContent;
        document.getElementById('overlay').style.display = 'flex';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        inputCode = "";
    }

    // --- 各種アクション ---
    function tapBed() {
        if(!state.hasSpoon) {
            showMsg("ベッドの下に何かある...「スプーン」を手に入れた。");
            state.inventory.push(items.spoon); state.hasSpoon = true; updateInventoryUI();
        } else showMsg("硬い鉄板のベッドだ。");
    }

    function tapWall() {
        const item = getSelectedItem();
        if(item && item.id === 'spoon') {
            if(!state.wallScraped) {
                showMsg("スプーンで壁を削ると、中に紙片が隠されていた。");
                state.inventory.push(items.note); state.wallScraped = true; updateInventoryUI();
            } else showMsg("もう削れる場所はない。");
        } else showMsg("脆くな
