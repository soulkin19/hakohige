<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>箱ひげ図メーカー</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@sgratzl/chartjs-chart-boxplot@4.4.5/build/index.umd.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h2 {
      margin-top: 0;
      color: #2c3e50;
    }
    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      font-family: 'Consolas', monospace;
      font-size: 15px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      resize: vertical;
      background: #fdfdfe;
    }
    .controls {
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #drawBtn {
      background: #007bff;
      color: white;
    }
    #drawBtn:hover { background: #0056b3; }
    #saveBtn {
      background: #28a745;
      color: white;
    }
    #saveBtn:hover { background: #218838; }
    #saveBtn:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    label {
      font-size: 15px;
      user-select: none;
    }
    .range-inputs {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .range-inputs input {
      width: 120px;
      padding: 8px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 14px;
    }
    #chartContainer {
      margin-top: 24px;
      height: 420px;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      overflow: hidden;
      padding: 12px;
    }
    #dataSection {
      margin-top: 32px;
      padding: 16px;
      background: #f1f3f5;
      border-radius: 8px;
    }
    #dataSection h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #2c3e50;
    }
    #dataList {
      list-style: none;
      padding: 0;
      columns: 3;
      font-family: monospace;
      font-size: 14px;
    }
    #dataList li {
      margin-bottom: 4px;
    }
    pre {
      background: #f1f3f5;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>箱ひげ図メーカー</h2>
  <p>1行に1つの数値を入力してください（空行・文字は自動無視）。データポイントはグラフ上から非表示にし、下の一覧で確認できます。範囲を指定してズーム表示も可能です。</p>

  <pre>例：
55
62
68
71
74
78
82
85
89
95
102
108</pre>

  <textarea id="dataInput" placeholder="ここにデータを貼り付け..."></textarea>

  <div class="controls">
    <button id="drawBtn" onclick="draw()">箱ひげ図を描く</button>
    <button id="saveBtn" disabled onclick="saveAsImage()">画像として保存 (PNG)</button>
    <label>
      <input type="checkbox" id="realtime" checked> 入力中にリアルタイム更新
    </label>
    <div class="range-inputs">
      <label>表示最小値: <input type="number" id="minValue" placeholder="自動"></label>
      <label>表示最大値: <input type="number" id="maxValue" placeholder="自動"></label>
    </div>
  </div>

  <div id="chartContainer">
    <canvas id="myChart"></canvas>
  </div>

  <div id="dataSection">
    <h3>データ一覧（ソート済み）</h3>
    <ul id="dataList"></ul>
  </div>
</div>

<script>
let chart = null;

function draw() {
  const textarea = document.getElementById('dataInput');
  const lines = textarea.value.trim().split(/\n/);
  
  const numbers = lines
    .map(line => line.trim())
    .filter(line => line !== '' && !isNaN(parseFloat(line)))
    .map(Number)
    .sort((a, b) => a - b);

  if (numbers.length < 4) {
    alert('箱ひげ図には4個以上の数値が推奨されます');
    if (chart) chart.destroy();
    updateDataList([]);
    document.getElementById('saveBtn').disabled = true;
    return;
  }

  updateDataList(numbers);
  document.getElementById('saveBtn').disabled = false;

  const minVal = parseFloat(document.getElementById('minValue').value) || undefined;
  const maxVal = parseFloat(document.getElementById('maxValue').value) || undefined;

  const data = {
    labels: ['データ分布'],
    datasets: [{
      label: '値',
      type: 'boxplot',
      data: [numbers],
      backgroundColor: 'rgba(54, 162, 235, 0.28)',
      borderColor: 'rgba(54, 162, 235, 0.9)',
      borderWidth: 2,
      outlierColor: 'transparent',
      outlierRadius: 0,
      itemRadius: 0,
      padding: 20,
      whiskerColor: 'rgba(0,0,0,0.5)',
      medianColor: '#2c3e50',
      medianWidth: 3
    }]
  };

  const config = {
    type: 'boxplot',
    data: data,
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 14 } } },
        title: {
          display: true,
          text: `箱ひげ図（n = ${numbers.length}）`,
          font: { size: 20 },
          padding: { top: 10, bottom: 20 }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '値', font: { size: 15 } },
          min: minVal,
          max: maxVal
        },
        y: { title: { display: false } }
      }
    }
  };

  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, config);
}

function saveAsImage() {
  if (!chart) return;
  
  const n = chart.data.datasets[0].data[0].length;
  const base64 = chart.toBase64Image('image/png', 1.0);  // 高品質PNG
  
  const link = document.createElement('a');
  link.href = base64;
  link.download = `箱ひげ図_${n}個.png`;
  link.click();
}

function updateDataList(numbers) {
  const list = document.getElementById('dataList');
  list.innerHTML = '';
  numbers.forEach(num => {
    const li = document.createElement('li');
    li.textContent = num;
    list.appendChild(li);
  });
}

// リアルタイム更新
document.getElementById('dataInput').addEventListener('input', () => {
  if (document.getElementById('realtime').checked) {
    draw();
  }
});

// 範囲変更時も更新
document.getElementById('minValue').addEventListener('input', draw);
document.getElementById('maxValue').addEventListener('input', draw);

// 初回サンプル
window.addEventListener('load', () => {
  document.getElementById('dataInput').value = 
`55
62
68
71
74
78
82
85
89
95
102
108`.trim();
  draw();
});
</script>

</body>
</html>
