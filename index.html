<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>改行で数値を入力 → 箱ひげ図</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-box-and-violin-plot@4.0.1/build/index.umd.min.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    textarea {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 15px;
      padding: 10px;
    }
    button {
      margin: 10px 0;
      padding: 8px 16px;
      font-size: 15px;
    }
    #chartContainer {
      margin-top: 20px;
      height: 400px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>箱ひげ図ジェネレーター</h2>
  <p>1行に1つの数値を入力してください（例）</p>
  <pre>
72.5
68
81
59.5
90
77
64
    </pre>

  <textarea id="dataInput" placeholder="ここに数値を1行ずつ入力..."></textarea>
  
  <div>
    <button onclick="drawBoxPlot()">箱ひげ図を描画</button>
    <label><input type="checkbox" id="realtime" checked> 入力中リアルタイム更新</label>
  </div>

  <div id="chartContainer">
    <canvas id="myChart"></canvas>
  </div>
</div>

<script>
// グローバル変数
let chart = null;

function drawBoxPlot() {
  const textarea = document.getElementById('dataInput');
  const text = textarea.value.trim();
  
  if (!text) {
    alert('数値を入力してください');
    return;
  }

  // 改行で分割 → 数値に変換 → 空行・非数値を除外
  const numbers = text.split(/\n/)
    .map(line => line.trim())
    .filter(line => line !== '')
    .map(str => parseFloat(str))
    .filter(n => !isNaN(n));

  if (numbers.length < 4) {
    alert('箱ひげ図を描くには最低4つ以上の数値が必要です');
    return;
  }

  // Chart.js 用データ準備
  const data = {
    labels: ['データ'],  // 1グループだけ
    datasets: [{
      label: '測定値',
      type: 'boxplot',
      data: [numbers],           // ← ここがポイント：配列の配列
      backgroundColor: 'rgba(54, 162, 235, 0.2)',
      borderColor: 'rgba(54, 162, 235, 1)',
      borderWidth: 2,
      outlierColor: '#ff6384',
      padding: 10,
      itemRadius: 4
    }]
  };

  const config = {
    type: 'boxplot',
    data: data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'top' },
        title: {
          display: true,
          text: `箱ひげ図 (n = ${numbers.length})`
        }
      },
      scales: {
        y: {
          title: { display: true, text: '値' }
        }
      }
    }
  };

  // 既存のチャートがあれば破棄
  if (chart) {
    chart.destroy();
  }

  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, config);
}

// リアルタイム更新の設定
document.getElementById('dataInput').addEventListener('input', () => {
  if (document.getElementById('realtime').checked) {
    drawBoxPlot();
  }
});

// ページ読み込み時にサンプルデータで表示
window.onload = () => {
  document.getElementById('dataInput').value = 
`72.5
68
81
59.5
90
77
64
88.5
62
75
`;
  drawBoxPlot();
};
</script>

</body>
</html>
