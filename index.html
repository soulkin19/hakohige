<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>改行で数値を入力 → 箱ひげ図（2026年最新版）</title>
  <!-- Chart.js 本体（最新安定版） -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- 箱ひげ図プラグイン（sgratzl版・現在メンテされているもの） -->
  <script src="https://cdn.jsdelivr.net/npm/@sgratzl/chartjs-chart-boxplot@4.4.5/build/index.umd.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 960px; margin: auto; }
    textarea {
      width: 100%;
      height: 160px;
      font-family: monospace;
      font-size: 15px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      margin: 12px 0;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #chartContainer {
      margin-top: 20px;
      height: 420px;
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<h2>箱ひげ図ジェネレーター（入力してすぐ見れる）</h2>
<p>1行に1つの数値を入れてください（小数もOK）。空行や文字は自動で無視されます。</p>

<textarea id="dataInput" placeholder="例：
72.5
68
81
59.5
90
77
64
..."></textarea>

<div>
  <button onclick="draw()">描画する</button>
  <label style="margin-left:20px;">
    <input type="checkbox" id="realtime" checked> 入力中リアルタイム更新
  </label>
</div>

<div id="chartContainer">
  <canvas id="myChart"></canvas>
</div>

<script>
let chart = null;

function draw() {
  const textarea = document.getElementById('dataInput');
  const lines = textarea.value.trim().split(/\n/);
  
  const numbers = lines
    .map(line => line.trim())
    .filter(line => line !== '' && !isNaN(parseFloat(line)))
    .map(Number);

  if (numbers.length < 3) {
    alert('最低3〜4個以上の数値が必要です');
    if (chart) chart.destroy();
    return;
  }

  const data = {
    labels: ['データ'],
    datasets: [{
      label: '値の分布',
      type: 'boxplot',
      data: [numbers],
      backgroundColor: 'rgba(75, 192, 192, 0.25)',
      borderColor: 'rgba(75, 192, 192, 1)',
      borderWidth: 2,
      outlierColor: '#ff6384',
      padding: 20,
      itemRadius: 5,
      itemStyle: 'circle',
      outlierRadius: 5,
      whiskerColor: 'rgba(0,0,0,0.6)',
      medianColor: 'black',
      medianWidth: 3
    }]
  };

  const config = {
    type: 'boxplot',
    data: data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top' },
        title: {
          display: true,
          text: `箱ひげ図（データ数: ${numbers.length}）`,
          font: { size: 18 }
        }
      },
      scales: {
        y: {
          title: { display: true, text: '値' }
        }
      }
    }
  };

  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, config);
}

// リアルタイム更新
document.getElementById('dataInput').addEventListener('input', () => {
  if (document.getElementById('realtime').checked) {
    draw();
  }
});

// 初回サンプル表示
window.addEventListener('load', () => {
  document.getElementById('dataInput').value = 
`55
62
68
71
74
78
82
85
89
95
102
108
`.trim();
  draw();
});
</script>

</body>
</html>
